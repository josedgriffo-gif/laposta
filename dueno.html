<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>La Posta — HOY</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1b5e20">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a1a; font-size: 16px; }

  #header {
    background: #1b5e20;
    color: white;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    min-height: 56px;
  }
  #header h1 { font-size: 1.2rem; font-weight: 700; }
  #btn-volver {
    background: rgba(255,255,255,0.15);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
  }
  #fecha-label { font-size: 0.85rem; opacity: 0.8; }

  #contenido { padding: 16px; max-width: 700px; margin: 0 auto; }

  .card {
    background: white;
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  /* ── Bloque principal ─────────────────────────────────────────────────── */
  .fila-num {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 10px 0;
    border-bottom: 1px solid #f0f0f0;
  }
  .fila-num:last-child { border-bottom: none; }
  .fila-num.separador { border-top: 2px solid #1b5e20; margin-top: 4px; padding-top: 14px; }

  .fila-label {
    font-size: 0.82rem;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .fila-label.destacado { color: #1a1a1a; font-size: 0.88rem; }

  .fila-derecha {
    display: flex;
    align-items: baseline;
    gap: 14px;
    flex-shrink: 0;
  }
  .fila-monto {
    font-size: 1.5rem;
    font-weight: 800;
    color: #1b5e20;
    text-align: right;
  }
  .fila-monto.gris { color: #555; font-size: 1.2rem; font-weight: 700; }
  .fila-monto.grande { font-size: 2rem; }

  .badge-pct {
    font-size: 0.9rem;
    font-weight: 700;
    color: white;
    background: #2e7d32;
    border-radius: 20px;
    padding: 3px 10px;
    white-space: nowrap;
  }
  .badge-pct.naranja { background: #e65100; }
  .badge-info {
    font-size: 0.85rem;
    font-weight: 600;
    color: #888;
    white-space: nowrap;
  }

  /* ── Barra de meta ────────────────────────────────────────────────────── */
  .barra-wrap {
    background: #e8f5e9;
    border-radius: 10px;
    height: 18px;
    overflow: hidden;
    margin: 10px 0 4px;
  }
  .barra-fill {
    height: 100%;
    border-radius: 10px;
    background: linear-gradient(90deg, #2e7d32, #66bb6a);
    transition: width 0.6s ease;
    min-width: 4px;
  }
  .barra-fill.superada { background: linear-gradient(90deg, #e65100, #ffa726); }

  /* ── Tabla productos ──────────────────────────────────────────────────── */
  .tabla-productos {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }
  .tabla-productos thead tr {
    border-bottom: 2px solid #e0e0e0;
  }
  .tabla-productos th {
    font-size: 0.75rem;
    font-weight: 700;
    color: #999;
    text-transform: uppercase;
    letter-spacing: 0.4px;
    padding: 6px 8px;
    text-align: right;
  }
  .tabla-productos th:first-child { text-align: left; padding-left: 0; }
  .tabla-productos td {
    padding: 10px 8px;
    text-align: right;
    border-bottom: 1px solid #f5f5f5;
    vertical-align: middle;
  }
  .tabla-productos td:first-child { text-align: left; padding-left: 0; }
  .tabla-productos tr:last-child td { border-bottom: none; }

  .prod-nombre { font-weight: 600; color: #1a1a1a; }
  .prod-cat { font-size: 0.72rem; color: #aaa; margin-top: 1px; }
  .td-ventas { font-weight: 700; color: #1b5e20; }
  .td-costo { color: #666; }
  .td-margen { font-weight: 700; color: #1565c0; }
  .td-pct { font-weight: 700; border-radius: 12px; padding: 2px 8px; font-size: 0.85rem; white-space: nowrap; }
  .pct-ok { color: #2e7d32; background: #e8f5e9; }
  .pct-medio { color: #e65100; background: #fff3e0; }
  .pct-bajo { color: #c62828; background: #ffebee; }

  /* ── Actualización ────────────────────────────────────────────────────── */
  #ultimo-update { text-align: center; font-size: 0.8rem; color: #bbb; margin-top: 8px; padding-bottom: 16px; }
  #btn-actualizar {
    display: block;
    margin: 0 auto 16px;
    background: #e8f5e9;
    color: #2e7d32;
    border: none;
    border-radius: 8px;
    padding: 10px 24px;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
  }

  /* ── Loading ──────────────────────────────────────────────────────────── */
  #loading {
    position: fixed; inset: 0;
    background: #1b5e20;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    z-index: 999;
    font-size: 1.1rem;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 4px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  #sin-datos { text-align: center; color: #bbb; padding: 40px 20px; font-size: 1rem; display: none; }

  /* ── PIN ───────────────────────────────────────────────────────────────── */
  #pantalla-pin {
    position: fixed; inset: 0;
    background: #1b5e20;
    color: white;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 998;
  }
  #pantalla-pin h2 { font-size: 1.4rem; }
  #pin-dots { display: flex; gap: 14px; }
  .pin-dot { width: 20px; height: 20px; border-radius: 50%; background: rgba(255,255,255,0.3); border: 2px solid rgba(255,255,255,0.5); transition: background 0.1s; }
  .pin-dot.lleno { background: white; }
  #pin-teclado { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; width: 260px; }
  .pin-key { background: rgba(255,255,255,0.15); color: white; border-radius: 12px; padding: 20px; font-size: 1.5rem; font-weight: 700; text-align: center; cursor: pointer; border: none; }
  .pin-key:active { background: rgba(255,255,255,0.3); }
  #pin-error { color: #ff8a80; font-size: 0.9rem; min-height: 20px; }

  .card-titulo {
    font-size: 0.8rem;
    font-weight: 700;
    color: #bbb;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
</style>
</head>
<body>

<!-- Pantalla PIN -->
<div id="pantalla-pin">
  <h2>HOY</h2>
  <div id="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div id="pin-error"></div>
  <div id="pin-teclado">
    <button class="pin-key" onclick="pinKey('1')">1</button>
    <button class="pin-key" onclick="pinKey('2')">2</button>
    <button class="pin-key" onclick="pinKey('3')">3</button>
    <button class="pin-key" onclick="pinKey('4')">4</button>
    <button class="pin-key" onclick="pinKey('5')">5</button>
    <button class="pin-key" onclick="pinKey('6')">6</button>
    <button class="pin-key" onclick="pinKey('7')">7</button>
    <button class="pin-key" onclick="pinKey('8')">8</button>
    <button class="pin-key" onclick="pinKey('9')">9</button>
    <button class="pin-key" onclick="pinKey('⌫')">⌫</button>
    <button class="pin-key" onclick="pinKey('0')">0</button>
    <button class="pin-key" onclick="pinKey('OK')" style="background:rgba(255,255,255,0.3)">OK</button>
  </div>
</div>

<div id="loading" style="display:none">
  <div class="spinner"></div>
  <span>Cargando datos...</span>
</div>

<div id="header">
  <div>
    <h1>HOY <span style="font-size:0.7rem;opacity:0.6">v4.1</span></h1>
    <div id="fecha-label"></div>
  </div>
  <button id="btn-volver" onclick="window.location.href='index.html'">← Caja</button>
</div>

<div id="contenido">

  <div id="sin-datos">No hay ventas registradas hoy.</div>

  <!-- Bloque principal -->
  <div class="card" id="card-principal">

    <!-- Meta -->
    <div class="fila-num">
      <span class="fila-label destacado">Objetivo del día</span>
      <div class="fila-derecha">
        <span class="fila-monto gris" id="num-meta">$ 0</span>
      </div>
    </div>
    <div class="barra-wrap"><div class="barra-fill" id="barra-fill" style="width:0%"></div></div>

    <!-- Ventas -->
    <div class="fila-num" style="margin-top:4px">
      <span class="fila-label destacado">Ventas hasta ahora</span>
      <div class="fila-derecha">
        <span class="badge-info" id="num-tickets">0 tickets</span>
        <span class="badge-pct" id="badge-meta-pct">0%</span>
        <span class="fila-monto grande" id="num-total">$ 0</span>
      </div>
    </div>

    <!-- Costo -->
    <div class="fila-num">
      <span class="fila-label">Costo de mercadería vendida</span>
      <div class="fila-derecha">
        <span class="fila-monto gris" id="num-costo">$ 0</span>
      </div>
    </div>

    <!-- Margen bruto -->
    <div class="fila-num separador">
      <span class="fila-label destacado">Margen bruto</span>
      <div class="fila-derecha">
        <span class="badge-pct" id="badge-margen-pct">0%</span>
        <span class="fila-monto" id="num-margen">$ 0</span>
      </div>
    </div>

  </div>

  <!-- Productos -->
  <div class="card" id="card-productos">
    <div class="card-titulo">Productos del día</div>
    <div id="productos-contenido"></div>
  </div>

  <button id="btn-actualizar" onclick="cargarDatos()">↻ Actualizar</button>
  <div id="ultimo-update"></div>

</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbzYU4oUPCb7jNORognxXS-gVDVk8SBqU6H7Kp24eWxMtZD9pZ5wjMGpXK35aOTjLHkb0Q/exec';

// ── PIN ────────────────────────────────────────────────────────────────────
let pinBuffer = '';
let pinConfig = null;

async function initPin() {
  try {
    const res = await fetch(`${API_URL}?action=getConfig`);
    const json = await res.json();
    pinConfig = json.data;
  } catch(e) {
    pinConfig = { PIN_Dueño: '0000', PIN_Admin: '1234' };
  }
}

function pinKey(val) {
  if (val === '⌫') {
    pinBuffer = pinBuffer.slice(0, -1);
  } else if (val === 'OK') {
    verificarPin();
    return;
  } else if (pinBuffer.length < 4) {
    pinBuffer += val;
  }
  actualizarDots();
  if (pinBuffer.length === 4) verificarPin();
}

function actualizarDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById(`d${i}`).classList.toggle('lleno', i < pinBuffer.length);
  }
}

function verificarPin() {
  const pinNroshoy = String(pinConfig?.PIN_Dueño || '0000').padStart(4, '0');
  if (pinBuffer === pinNroshoy) {
    document.getElementById('pantalla-pin').style.display = 'none';
    document.getElementById('loading').style.display = 'flex';
    cargarDatos();
  } else {
    document.getElementById('pin-error').textContent = 'PIN incorrecto';
    pinBuffer = '';
    actualizarDots();
    setTimeout(() => document.getElementById('pin-error').textContent = '', 1500);
  }
}

initPin();

async function apiGet(action) {
  const res = await fetch(`${API_URL}?action=${action}`);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error);
  return json.data;
}

function formatPesos(n) {
  return '$ ' + Math.round(Number(n) || 0).toLocaleString('es-AR');
}

function claseMargenPct(pct) {
  if (pct >= 35) return 'pct-ok';
  if (pct >= 20) return 'pct-medio';
  return 'pct-bajo';
}

async function cargarDatos() {
  try {
    const [resumen, ventasHoy, config] = await Promise.all([
      apiGet('getResumenHoy'),
      apiGet('getVentasHoy'),
      apiGet('getConfig')
    ]);

    document.getElementById('loading').style.display = 'none';

    const meta = Number(config?.Meta_Diaria) || 1500000;
    const hoy = new Date().toLocaleDateString('es-AR', {
      timeZone: 'America/Argentina/Buenos_Aires',
      weekday: 'long', day: 'numeric', month: 'long'
    });
    document.getElementById('fecha-label').textContent = hoy;

    if (!resumen) {
      document.getElementById('sin-datos').style.display = 'block';
      document.getElementById('card-principal').style.display = 'none';
      document.getElementById('card-productos').style.display = 'none';
      document.getElementById('ultimo-update').textContent = 'Sin ventas hoy';
      return;
    }

    document.getElementById('sin-datos').style.display = 'none';
    document.getElementById('card-principal').style.display = 'block';
    document.getElementById('card-productos').style.display = 'block';

    // ── Meta ──────────────────────────────────────────────────────────────
    const total    = Number(resumen['Total_Ventas']) || 0;
    const costo    = Number(resumen['Costo_Total']) || 0;
    const margen   = total - costo;
    const margenPct = total > 0 ? (margen / total * 100) : 0;
    const metaPct  = total / meta * 100;
    const superada = metaPct >= 100;
    const tickets  = Number(resumen['Cant_Tickets']) || 0;

    document.getElementById('num-meta').textContent     = formatPesos(meta);
    document.getElementById('barra-fill').style.width   = Math.min(100, metaPct) + '%';
    document.getElementById('barra-fill').className     = 'barra-fill' + (superada ? ' superada' : '');
    document.getElementById('num-total').textContent    = formatPesos(total);
    document.getElementById('num-tickets').textContent  = tickets + (tickets === 1 ? ' ticket' : ' tickets');
    document.getElementById('num-costo').textContent    = formatPesos(costo);
    document.getElementById('num-margen').textContent   = formatPesos(margen);

    const badgeMeta = document.getElementById('badge-meta-pct');
    badgeMeta.textContent = metaPct.toFixed(1) + '%';
    badgeMeta.className = 'badge-pct' + (superada ? ' naranja' : '');

    document.getElementById('badge-margen-pct').textContent = margenPct.toFixed(1) + '%';

    // ── Productos ──────────────────────────────────────────────────────────
    const detalle = ventasHoy.detalle || [];
    const porProducto = {};
    detalle.forEach(d => {
      const nombre = d['Producto'];
      if (!porProducto[nombre]) {
        porProducto[nombre] = {
          nombre,
          categoria: d['Categoría'] || '',
          ventas: 0,
          costo: 0,
          margen: 0
        };
      }
      porProducto[nombre].ventas  += Number(d['Subtotal'])    || 0;
      porProducto[nombre].costo   += Number(d['Costo Total']) || 0;
      porProducto[nombre].margen  += Number(d['Margen $'])    || 0;
    });

    const top = Object.values(porProducto).sort((a, b) => b.ventas - a.ventas);

    const prodCont = document.getElementById('productos-contenido');
    if (top.length === 0) {
      prodCont.innerHTML = '<div style="color:#bbb;text-align:center;padding:10px">Sin ventas hoy</div>';
    } else {
      prodCont.innerHTML = `
        <table class="tabla-productos">
          <thead>
            <tr>
              <th>Producto</th>
              <th>$ Ventas</th>
              <th>$ Costo</th>
              <th>$ Margen</th>
              <th>% Margen</th>
            </tr>
          </thead>
          <tbody>
            ${top.map(p => {
              const pct = p.ventas > 0 ? (p.margen / p.ventas * 100) : 0;
              return `<tr>
                <td>
                  <div class="prod-nombre">${p.nombre}</div>
                  ${p.categoria ? `<div class="prod-cat">${p.categoria}</div>` : ''}
                </td>
                <td class="td-ventas">${formatPesos(p.ventas)}</td>
                <td class="td-costo">${formatPesos(p.costo)}</td>
                <td class="td-margen">${formatPesos(p.margen)}</td>
                <td><span class="td-pct ${claseMargenPct(pct)}">${pct.toFixed(1)}%</span></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>`;
    }

    // ── Timestamp ─────────────────────────────────────────────────────────
    const hora = new Date().toLocaleTimeString('es-AR', {
      timeZone: 'America/Argentina/Buenos_Aires',
      hour: '2-digit', minute: '2-digit'
    });
    document.getElementById('ultimo-update').textContent = `Última actualización: ${hora}`;

  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('sin-datos').style.display = 'block';
    document.getElementById('sin-datos').textContent = 'Error al cargar datos: ' + e.message;
  }
}

cargarDatos();
setInterval(cargarDatos, 120000);
</script>
</body>
</html>
